<h2 style="text-align: center;">Negative affect</h2>

<h3 style="text-align:center;">I feel nervous.</h3>

<div style="width:320px; margin:40px auto; text-align:center;">
  <input type="range" min="1" max="5" value="3" step="1"
         oninput="this.nextElementSibling.value = this.value"
         style="width:100%;">

  <!-- Numbers -->
  <div style="display:grid; grid-template-columns:repeat(5, 1fr);">
    <span>1</span><span>2</span><span>3</span>
    <span>4</span><span>5</span>
  </div>

  <!-- Labels aligned to 1, 5, 7 -->
  <div style="display:grid; grid-template-columns:repeat(5, 1fr); margin-top:5px; font-size:0.9em;">
    <span style="grid-column:1;">Not at all</span>
    <span style="grid-column:3; text-align:center;">Moderate</span>
    <span style="grid-column:5; text-align:right;">Extremely</span>
  </div>


</div>
